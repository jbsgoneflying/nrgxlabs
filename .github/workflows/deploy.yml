name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 8m
          script: |
            set -e
            echo "--- Connected to $(hostname) ---"
            cd /opt/breach-algo
            echo "--- Pulling latest code ---"
            git pull
            echo "--- Building and restarting v1 (app) ---"
            docker compose up -d --build app
            echo "--- Building and restarting v2 (app-v2) ---"
            docker compose up -d --build app-v2 || echo "WARN: app-v2 build/start returned non-zero (continuing — v1 must not regress)"
            echo "--- Waiting for both services to start ---"
            sleep 10
            echo "--- v1 health ---"
            curl -sf http://localhost:8000/api/health && echo "v1 health PASSED" || echo "v1 health FAILED (app may still be starting)"
            echo "--- v2 health ---"
            curl -sf http://localhost:8001/api/v2/health && echo "v2 health PASSED" || echo "v2 health FAILED (app-v2 may still be starting)"
            echo "--- Engine 17: bootstrap AI Capex scan if cache is empty/missing (detached; nightly cron handles steady-state) ---"
            docker compose exec -T app python3 -c "from backend.ai_capex import store; import sys; s=store.get_scan() or {}; sys.exit(0 if (s.get('evidenceTotal') or 0) > 0 else 1)" \
              && echo "AI Capex scan already populated; skipping bootstrap" \
              || (echo "No populated scan — kicking detached populate via API (runs ~3-6 min in background)"; curl -sf -X POST "http://localhost:8000/api/ai-capex/refresh?background=true" || echo "WARN: bootstrap kick returned non-zero (continuing)"; true)
            echo "--- Deploy complete at $(date) ---"

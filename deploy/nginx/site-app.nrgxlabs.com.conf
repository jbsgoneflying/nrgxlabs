# Nginx site config for `app.nrgxlabs.com` — the new home of the
# Raven Tech / NRGX Labs research platform.
#
# Mirrors `site-app.raven-tech.co.conf` exactly: same backends, same
# routes, same rate limits, same flow-monitor mount. Both domains
# serve the same app simultaneously during the migration window;
# once `app.nrgxlabs.com` is verified, `app.raven-tech.co` becomes
# a 301 redirect to the new hostname (separate config, see runbook).
#
# Routes:
#   /                 -> v1 FastAPI on :8000
#   /api/             -> v1 FastAPI on :8000 (rate-limited)
#   /api/v2/          -> v2 FastAPI on :8001
#   /flow-monitor     -> Next.js prediction-market dashboard on :3000
#   /flow-monitor/api -> Flow-monitor backend on :3100
#
# Install (one-time, on droplet):
#   sudo cp deploy/nginx/site-app.nrgxlabs.com.conf /etc/nginx/sites-available/app.nrgxlabs.com
#   sudo ln -s /etc/nginx/sites-available/app.nrgxlabs.com /etc/nginx/sites-enabled/app.nrgxlabs.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then provision TLS:
#   sudo certbot --nginx -d app.nrgxlabs.com
# (certbot will auto-add the listen 443 ssl block + 80→443 redirect.)

server {
  listen 80;
  server_name app.nrgxlabs.com;

  # Allow large responses (tables/telemetry) and avoid premature proxy cutoffs.
  client_max_body_size 10m;

  location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # API rate limiting (requires: limit_req_zone zone=api_ratelimit in http{}).
  location /api/ {
    limit_req zone=api_ratelimit burst=30 nodelay;
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # Raven Tech v2 API passthrough — longer-prefix wins over /api/ above.
  location /api/v2/ {
    limit_req zone=api_ratelimit burst=30 nodelay;
    proxy_pass http://127.0.0.1:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # Flow-monitor backend (Kalshi/Polymarket dashboard API).
  # Long timeouts for SSE streaming.
  location /flow-monitor/api/ {
    proxy_pass http://127.0.0.1:3100/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;
  }

  # Flow-monitor Next.js app (basePath: /flow-monitor).
  location /flow-monitor {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;
  }
}

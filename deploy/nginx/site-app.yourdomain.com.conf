# Nginx site config template — `app.<yourdomain>` → `<yourdomain>`.
# Redirects the app. subdomain to the root domain so all traffic
# is served from a single hostname. Replace `yourdomain.com` with
# your real hostname before installing. For the production NRGX
# Labs config see `site-app.nrgxlabs.com.conf`.
#
# Install (example):
#   sudo cp deploy/nginx/site-app.yourdomain.com.conf /etc/nginx/sites-available/app.yourdomain.com
#   sudo ln -s /etc/nginx/sites-available/app.yourdomain.com /etc/nginx/sites-enabled/app.yourdomain.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then:
#   sudo certbot --nginx -d app.yourdomain.com

server {
  listen 80;
  server_name app.yourdomain.com;

  return 301 https://yourdomain.com$request_uri;
}

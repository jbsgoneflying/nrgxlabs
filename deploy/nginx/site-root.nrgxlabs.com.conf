# Nginx site config for `nrgxlabs.com` (apex + www).
# Serves the static splash page directly from the repo working tree.
# No proxy, no app — just HTML/CSS/PNG bytes off the filesystem.
#
# The splash files live at /opt/breach-algo/nrgxlabs-splash/ and are
# updated automatically by the existing GitHub Actions deploy workflow
# (every push to main runs `git pull` on the droplet — same mechanism
# that updates the app code).
#
# Install (one-time, on droplet):
#   sudo cp deploy/nginx/site-root.nrgxlabs.com.conf /etc/nginx/sites-available/nrgxlabs.com
#   sudo ln -s /etc/nginx/sites-available/nrgxlabs.com /etc/nginx/sites-enabled/nrgxlabs.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then provision TLS:
#   sudo certbot --nginx -d nrgxlabs.com -d www.nrgxlabs.com
# (certbot will auto-add the listen 443 ssl block + 80→443 redirect.)

server {
  listen 80;
  server_name nrgxlabs.com www.nrgxlabs.com;

  # Static splash, served directly from the repo working tree.
  root /opt/breach-algo/nrgxlabs-splash;
  index index.html;

  # Small body limit — there's nothing to upload here.
  client_max_body_size 1m;

  # Default route: serve index.html for any path that doesn't map
  # to a real file. Keeps the page working even if someone types
  # nrgxlabs.com/anything.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # No-cache for HTML so splash edits ship instantly on push to main.
  location ~* \.html$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires 0;
  }

  # Long-cache static assets (CSS, images, fonts) since their content
  # rarely changes; the HTML's cache headers force re-fetch when
  # references update.
  location ~* \.(css|js|png|jpg|jpeg|svg|ico|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
  }

  # robots.txt and sitemap.xml live in the splash directory and
  # are served by the default location block above. No special
  # config needed for them.

  # Hide dotfiles (e.g. .DS_Store) if any sneak in.
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}

# Nginx site config for `raven-tech.co` (primary domain).
# Proxies to the app container bound on 127.0.0.1:8000 (see docker-compose.yml).
# Includes basic API rate limiting (requires rate-limit.conf in http{}).
#
# Install (example):
#   sudo cp deploy/nginx/site-root.raven-tech.co.conf /etc/nginx/sites-available/raven-tech.co
#   sudo ln -s /etc/nginx/sites-available/raven-tech.co /etc/nginx/sites-enabled/raven-tech.co
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then:
#   sudo certbot --nginx -d raven-tech.co -d www.raven-tech.co

server {
  listen 80;
  server_name raven-tech.co www.raven-tech.co;

  client_max_body_size 10m;

  location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 240s;
    proxy_send_timeout 240s;
  }

  location /api/ {
    limit_req zone=api_ratelimit burst=30 nodelay;
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 240s;
    proxy_send_timeout 240s;
  }
}

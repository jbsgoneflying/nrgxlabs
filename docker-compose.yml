services:
  # ─── Main Site (FastAPI) ─────────────────────────────────────
  app:
    build: .
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
